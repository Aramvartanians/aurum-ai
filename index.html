<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurum AI</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080809;
  --gold: #d4a843;
  --gold-light: #f0c96a;
  --gold-glow: rgba(212,168,67,0.08);
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --border-gold: rgba(212,168,67,0.25);
  --text: #f5f3ee;
  --text-muted: rgba(245,243,238,0.5);
  --text-dim: rgba(245,243,238,0.22);
  --user-bg: rgba(212,168,67,0.1);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', system-ui, sans-serif;
  font-weight: 300;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 600px; height: 600px;
  top: -200px; left: -100px;
  background: radial-gradient(circle, rgba(212,168,67,0.07) 0%, transparent 70%);
}
body::after {
  width: 500px; height: 500px;
  bottom: -150px; right: -100px;
  background: radial-gradient(circle, rgba(180,140,255,0.05) 0%, transparent 70%);
}

header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  background: rgba(8,8,9,0.7);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.2px;
  color: var(--text);
}

.logo-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, #d4a843 0%, #f0c96a 50%, #a87830 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  color: #1a1200;
  flex-shrink: 0;
}

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 100px;
  font-family: 'Geist Mono', monospace;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #4ade80;
  animation: breathe 2.5s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
}

main {
  flex: 1;
  overflow-y: auto;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

main::-webkit-scrollbar { width: 3px; }
main::-webkit-scrollbar-track { background: transparent; }
main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.messages {
  max-width: 740px;
  margin: 0 auto;
  padding: 48px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 48px 0 24px;
  animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-icon {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, #d4a843 0%, #f0c96a 50%, #a87830 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 500;
  color: #1a1200;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(212,168,67,0.2), 0 0 80px rgba(212,168,67,0.08);
}

.welcome h1 {
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.8px;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.2;
}

.welcome h1 strong {
  font-weight: 500;
  background: linear-gradient(135deg, #d4a843, #f0c96a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.welcome p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 340px;
  margin-bottom: 36px;
}

.starters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
  max-width: 480px;
}

.starter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 300;
  padding: 13px 15px;
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  line-height: 1.45;
  transition: all 0.2s ease;
}

.starter-btn:hover {
  border-color: var(--border-gold);
  color: var(--text);
  background: var(--gold-glow);
  transform: translateY(-1px);
}

.message {
  display: flex;
  gap: 12px;
  animation: msgIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.avatar {
  width: 30px; height: 30px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  margin-top: 2px;
  letter-spacing: 0.3px;
}

.avatar.ai {
  background: linear-gradient(135deg, #d4a843, #f0c96a);
  color: #1a1200;
  font-size: 11px;
}

.avatar.user-av {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.bubble {
  max-width: 80%;
  padding: 13px 16px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.72;
  font-weight: 300;
}

.message.ai .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-top-left-radius: 4px;
}

.message.user .bubble {
  background: var(--user-bg);
  border: 1px solid var(--border-gold);
  color: var(--text);
  border-top-right-radius: 4px;
}

.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 0;
}

.typing-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.4;
  animation: bounce 1.3s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 100% { opacity: 0.2; transform: translateY(0); }
  50% { opacity: 0.9; transform: translateY(-3px); }
}

footer {
  position: relative;
  z-index: 10;
  padding: 14px 24px 20px;
  background: rgba(8,8,9,0.8);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
}

.input-wrap { max-width: 740px; margin: 0 auto; }

.input-box {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.25s, box-shadow 0.25s;
}

.input-box:focus-within {
  border-color: var(--border-gold);
  box-shadow: 0 0 0 3px rgba(212,168,67,0.06);
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 300;
  line-height: 1.6;
  resize: none;
  max-height: 160px;
  min-height: 24px;
  overflow-y: auto;
  caret-color: var(--gold);
}

textarea::placeholder { color: var(--text-dim); }
textarea::-webkit-scrollbar { width: 3px; }
textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #d4a843, #c49030);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(212,168,67,0.25);
}

.send-btn:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(212,168,67,0.35); }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled {
  background: var(--surface);
  box-shadow: none;
  cursor: not-allowed;
  border: 1px solid var(--border);
}

.send-btn svg { width: 15px; height: 15px; fill: #1a1200; }
.send-btn:disabled svg { fill: var(--text-dim); }

.hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 9px;
  font-family: 'Geist Mono', monospace;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">Au</div>
    Aurum AI
  </div>
  <div class="pill"><span class="dot"></span>claude-sonnet-4</div>
</header>

<main id="main">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">Au</div>
      <h1>Hello, I'm <strong>Aurum AI</strong></h1>
      <p>Your intelligent assistant, powered by Claude. Ask me anything.</p>
      <div class="starters">
        <button class="starter-btn" onclick="sendStarter(this)">Explain quantum entanglement simply</button>
        <button class="starter-btn" onclick="sendStarter(this)">Help me write a short poem</button>
        <button class="starter-btn" onclick="sendStarter(this)">What's a good way to learn a new skill?</button>
        <button class="starter-btn" onclick="sendStarter(this)">Debug my thinking on a decision</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="input" placeholder="Message Aurum AI…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg viewBox="0 0 16 16"><path d="M2 13.5L14 8 2 2.5V6.5L10 8 2 9.5Z"/></svg>
      </button>
    </div>
    <p class="hint">↵ send · ⇧↵ newline</p>
  </div>
</footer>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');
let history = [], isLoading = false;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || isLoading;
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) submit();
  }
});

sendBtn.addEventListener('click', submit);

function sendStarter(btn) {
  inputEl.value = btn.textContent;
  inputEl.dispatchEvent(new Event('input'));
  submit();
}

function addMessage(role, content) {
  if (welcomeEl && role === 'user') welcomeEl.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'ai' ? 'ai' : 'user-av'}`;
  av.textContent = role === 'ai' ? 'Au' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollDown();
  return bubble;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'message ai';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = 'Au';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollDown();
  return wrap;
}

function scrollDown() {
  document.getElementById('main').scrollTop = 999999;
}

async function submit() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  const typingWrap = addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are Aurum AI, a thoughtful and articulate AI assistant. You are clear, warm, and concise. Respond naturally in plain text without markdown formatting.',
        messages: history
      })
    });

    const data = await res.json();
    typingWrap.remove();
    const reply = data.content?.[0]?.text || 'Something went wrong — please try again.';
    addMessage('ai', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    typingWrap.remove();
    addMessage('ai', 'Connection error. Please try again.');
  }

  isLoading = false;
  sendBtn.disabled = !inputEl.value.trim();
  inputEl.focus();
}
</script>
</body>
</html>
